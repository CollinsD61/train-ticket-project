apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: train-ticket
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/CollinsD61/train-ticket-project.git'
    targetRevision: HEAD
    path: deployment/helm/train-ticket
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
