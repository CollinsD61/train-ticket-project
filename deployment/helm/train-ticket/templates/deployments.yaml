{{- range $name, $service := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    {{- include "train-ticket.labels" $ | nindent 4 }}
spec:
  replicas: {{ $service.replicas | default $.Values.defaultReplicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $service.image | quote }}
          imagePullPolicy: {{ $service.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ $service.port }}
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          envFrom:
            - configMapRef:
                name: nacos
            {{- if $service.hasRabbit }}
            - configMapRef:
                name: rabbitmq
            {{- end }}
            {{- if $service.dbPrefix }}
            - secretRef:
                name: {{ $name }}-mysql
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ $service.port }}
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
---
{{- end }}
