              - 'pom.xml'
              - '.github/workflows/**'
            ts-payment-service:
              - 'ts-payment-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-preserve-other-service:
              - 'ts-preserve-other-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-preserve-service:
              - 'ts-preserve-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-price-service:
              - 'ts-price-service/**'
