            ts-execute-service:
              - 'ts-execute-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-food-service:
              - 'ts-food-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-gateway-service:
              - 'ts-gateway-service/**'
