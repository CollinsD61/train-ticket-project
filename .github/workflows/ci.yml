name: Monorepo Orchestrator CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'ts-*/**'
      - 'pom.xml'
      - '.github/workflows/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout:v3

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            ts-admin-basic-info-service:
              - 'ts-admin-basic-info-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-admin-order-service:
              - 'ts-admin-order-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-admin-route-service:
              - 'ts-admin-route-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-admin-travel-service:
              - 'ts-admin-travel-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-admin-user-service:
              - 'ts-admin-user-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-assurance-service:
              - 'ts-assurance-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-auth-service:
              - 'ts-auth-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-avatar-service:
              - 'ts-avatar-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-basic-service:
              - 'ts-basic-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-cancel-service:
              - 'ts-cancel-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-config-service:
              - 'ts-config-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-consign-price-service:
              - 'ts-consign-price-service/**'
              - 'ts-common/**'
              - 'pom.xml'
              - '.github/workflows/**'
            ts-consign-service:
              - 'ts-consign-service/**'
