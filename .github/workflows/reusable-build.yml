name: Reusable Microservice Builder

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "The folder name of the microservice (e.g. ts-auth-service)"
      image_name:
        required: true
        type: string
        description: "Docker image name to build (e.g. ts-auth-service)"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
        description: "Path to Dockerfile relative to service directory"
      context_path:
        required: false
        type: string
        default: "."
        description: "Docker build context path relative to service directory"
    secrets:
      gh_token:
        required: true
        description: "GitHub write token to commit changes back to repo"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.gh_token }}

      - name: Determine Build Type
        id: detect
        run: |
          BUILD_TYPE="maven"
          # Check if service is in non-maven list or if pom.xml doesn't exist in service folder
          if [[ "${{ inputs.service_name }}" == "ts-avatar-service" || "${{ inputs.service_name }}" == "ts-voucher-service" || "${{ inputs.service_name }}" == "ts-news-service" || "${{ inputs.service_name }}" == "ts-ticket-office-service" || "${{ inputs.service_name }}" == "ts-ui-dashboard" ]]; then
            BUILD_TYPE="docker"
          fi
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Set up JDK 8 (for Maven build)
        if: steps.detect.outputs.build_type == 'maven'
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile Maven Module
        if: steps.detect.outputs.build_type == 'maven'
        run: |
          mvn clean package -pl ${{ inputs.service_name }} -am -DskipTests

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.gh_token }}

      - name: Set Image Tag
        id: meta
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ inputs.service_name }}/${{ inputs.context_path }}
          file: ./${{ inputs.service_name }}/${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}

      - name: Install Python YAML Dependency
        run: pip install pyyaml

      - name: Update Helm Chart values.yaml
        shell: python
        run: |
          import yaml
          import os

          val_path = 'deployment/helm/train-ticket/values.yaml'
          service = '${{ inputs.service_name }}'
          new_image = '${{ steps.meta.outputs.image_tag }}'

          if os.path.exists(val_path):
              with open(val_path, 'r') as f:
                  data = yaml.safe_load(f)
              
              if 'services' in data and service in data['services']:
                  data['services'][service]['image'] = new_image
                  print(f"Updated {service} image to: {new_image}")
                  
                  with open(val_path, 'w') as f:
                      yaml.dump(data, f, default_flow_style=False, sort_keys=False)
              else:
                  print(f"Service {service} not found in values.yaml services")
          else:
              print(f"File {val_path} not found")

      - name: Commit and Push Helm Tag Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/helm/train-ticket/values.yaml
          git diff-index --quiet HEAD || git commit -m "chore(gitops): update ${{ inputs.service_name }} image tag to ${{ github.sha }} [skip ci]"
          git push origin HEAD:${{ github.ref }}
